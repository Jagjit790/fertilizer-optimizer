<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AgriSmart</title>
  <link rel="stylesheet" href="analyze.css">
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="logo">🌿 AgriSmart</div>

    <ul class="nav-links">
      <li><a class="nav-item" href="home.html">Home</a></li>
      <li><a class="nav-item active">Analyze Soil</a></li>
      <li><a class="nav-item" href="dashboard.html">Dashboard</a></li>
      <li><a class="nav-item" href="weather.html">Weather</a></li>
      <li><a class="nav-item" href="contact.html">Contact</a></li>
    </ul>

    <button class="login-btn" onclick="goToLogin()" id="authBtn" class="login-btn">Login</button>
  </nav>

  <section class="container">

    <!-- ICON -->
    <div class="icon">🧪</div>

    <!-- HEADING -->
    <h1>Analyze Your Soil</h1>
    <p class="subtitle">Enter your soil test data to get fertilizer recommendations</p>

    <!-- FORM CARD -->
    <div class="form-card">
      <form onsubmit="handleSubmit(event)">

        <label>Nitrogen (N) — mg/kg</label>
        <input type="number" id="n" placeholder="e.g. 80" required>

        <label>Phosphorus (P) — mg/kg</label>
        <input type="number" id="p" placeholder="e.g. 25" required>

        <label>Potassium (K) — mg/kg</label>
        <input type="number" id="k" placeholder="e.g. 35" required>

        <label>Soil pH</label>
        <input type="number" step="0.1" id="ph" placeholder="e.g. 6.5" required>

        <label>Crop Type</label>
        <select id="crop">
          <option>Wheat</option>
          <option>Rice</option>
          <option>Maize</option>
          <option>Sugarcane</option>
        </select>

        <button type="submit">🌱 Start Analysis</button>

      </form>
    </div>

  </section>

  <footer>
    <p>© 2026 AgriSmart | Sustainable Farming Solution</p>
  </footer>

<script>
// ======================
// NAV ACTIVE STATE
// ======================
document.addEventListener("DOMContentLoaded", () => {
  const navItems = document.querySelectorAll(".nav-item");

  navItems.forEach(item => {
    item.addEventListener("click", function () {
      navItems.forEach(nav => nav.classList.remove("active"));
      this.classList.add("active");
    });
  });
});


// ======================
// AUTH BUTTON (LOGIN / LOGOUT)
// ======================
document.addEventListener("DOMContentLoaded", () => {
  const authBtn = document.getElementById("authBtn");
  if (!authBtn) return;

  function updateAuthUI() {
    const token = localStorage.getItem("token");
    authBtn.innerText = token ? "Logout" : "Login";
  }

  updateAuthUI();

  authBtn.addEventListener("click", () => {
    const token = localStorage.getItem("token");

    if (token) {
      localStorage.removeItem("token");
      alert("Logged out");
      window.location.href = "/home.html";
    } else {
      window.location.href = "/login.html";
    }
  });
});


// ======================
// LOGIN REDIRECT HELPER
// ======================
function goToLogin() {
  window.location.href = "/login.html";
}


// ======================
// 🔥 FORM SUBMIT (DEPLOY SAFE)
// ======================
async function handleSubmit(e) {
  e.preventDefault();

  // 👉 IMPORTANT: use deployed backend URL, NOT localhost
  const BASE_URL = "https://your-backend.onrender.com";

  const data = {
    nitrogen: document.getElementById("n").value,
    phosphorus: document.getElementById("p").value,
    potassium: document.getElementById("k").value,
    ph: document.getElementById("ph").value,
    crop: document.getElementById("crop").value
  };

  try {
    const res = await fetch(`${BASE_URL}/api/save`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(data)
    });

    const result = await res.json();

    if (result._id) {
      localStorage.setItem("selectedSoil", result._id);
    }

    window.location.href = "/recommendation.html";

  } catch (error) {
    console.error("Error:", error);
    alert("Server error. Please try again later.");
  }
}
</script>

</body>
</html>
